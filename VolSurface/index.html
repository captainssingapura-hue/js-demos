<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX Volatility Surface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <div class="header">
    <div>
      <div class="header-title">FX Implied Volatility Surface</div>
      <div class="header-pair" id="header-pair">EUR/USD</div>
    </div>
    <div class="header-note">Illustrative SVI-style surface · not live data</div>
  </div>

  <!-- ── Controls ───────────────────────────────────────────────── -->
  <div class="controls">
    <div class="pair-buttons">
      <button class="pair-btn active" data-pair="EURUSD">EUR/USD</button>
      <button class="pair-btn"        data-pair="USDJPY">USD/JPY</button>
      <button class="pair-btn"        data-pair="GBPUSD">GBP/USD</button>
      <button class="pair-btn"        data-pair="USDCHF">USD/CHF</button>
    </div>

    <div class="controls-right">
      <label class="toggle-label">
        <input type="checkbox" id="wireframe-toggle" />
        Wireframe
      </label>
      <div class="select-wrap">
        <span>Colormap</span>
        <select id="colormap-select">
          <option value="plasma">Plasma</option>
          <option value="viridis">Viridis</option>
          <option value="rdylgn">RdYlGn</option>
          <option value="spectral">Spectral</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── Stats ──────────────────────────────────────────────────── -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">ATM 1M</div>
      <div class="stat-value" id="stat-atm">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">25Δ RR 1Y</div>
      <div class="stat-value" id="stat-rr">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vol Skew</div>
      <div class="stat-value" id="stat-skew">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Term Slope</div>
      <div class="stat-value" id="stat-slope">—</div>
    </div>
  </div>

  <!-- ── 3D Canvas ───────────────────────────────────────────────── -->
  <div class="canvas-wrap" id="canvas-wrap">
    <div id="tooltip"></div>
    <div class="axes-hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
  </div>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <div class="legend-row">
    <canvas id="legend-canvas" width="160" height="12"></canvas>
    <span class="legend-label">Low vol → High vol</span>
    <span class="legend-note">Three.js r128</span>
  </div>

  <!-- ── Scripts ─────────────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
